[coverage:run]
source =
  custom_components

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplemented()
    if __name__ == '__main__':
    main()
show_missing = true

[tool:pytest]
testpaths = tests
norecursedirs = .git
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    --strict
    --cov=custom_components
