set_current:
  description: "Установить ток зарядки"
  fields:
    entity_id:
      description: "Entity ID of the charger (any entity of this integration)."
      example: "number.eveus_home_current_set"
    current:
      description: "Значение тока в амперах"
      example: 16
      required: true
      selector:
        number:
          min: 6
          max: 32
          step: 1

set_ai_mode:
  description: "Установить режим адаптивного питания"
  fields:
    entity_id:
      description: "Entity ID of the charger."
    mode:
      description: "Режим: off, voltage, tesla_auto, power (V1 поддерживает только off и voltage)"
      required: true
      selector:
        select:
          options:
            - "off"
            - "voltage"
            - "tesla_auto"
            - "power"