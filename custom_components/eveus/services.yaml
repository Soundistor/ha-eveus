set_current:
  description: "Set the charging current."
  fields:
    entity_id:
      description: "Entity ID of the charger's current number entity."
      example: "number.eveus_home_current_set"
    current:
      description: "Charging current in amperes."
      example: 16
      required: true
      selector:
        number:
          min: 6
          max: 32
          step: 1

set_ai_mode:
  description: "Set the adaptive power (AI) mode."
  fields:
    entity_id:
      description: "Entity ID of the charger's AI mode select entity."
    mode:
      description: "AI mode. V1 firmware supports only off and voltage."
      required: true
      selector:
        select:
          options:
            - "off"
            - "voltage"
            - "tesla_auto"
            - "power"